version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to DockerHub...
      - echo $DOCKERHUB_PASSWORD | docker login --username $DOCKERHUB_USERNAME --password-stdin
  build:
    commands:
      - echo Building Docker image...
      - docker build -t brain-tasks-app .
      - docker tag brain-tasks-app anandhudevops1/brain-tasks-app:latest
  post_build:
    commands:
      - echo Pushing Docker image...
      - docker push anandhudevops1/brain-tasks-app:latest
artifacts:
  files: []
